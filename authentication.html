<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pudixel — Sucesso!</title>
<link rel="icon" type="image/png" href="Pudim.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap');

:root {
  --caramel: #D4821A;
  --caramel-light: #E8A03A;
  --cream: #FFF8EE;
  --cream-dark: #F0E4CC;
  --brown: #6B3F1A;
  --text-dark: #2E1A0E;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--text-dark);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  text-align: center;
}

.auth-container {
  position: relative;
  z-index: 10;
  padding: 40px;
}

/* ── FIXED CHECK ANIMATION ── */
.svg-wrapper {
  width: 150px;
  height: 150px;
  margin: 0 auto 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}

@media (min-width: 860px) {
  .svg-wrapper { width: 220px; height: 220px; }
}

.checkmark-svg {
  width: 100%;
  height: 100%;
  overflow: visible;
}

.checkmark-path {
  stroke-dasharray: 100;
  stroke-dashoffset: 100;
  stroke-width: 6;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke: var(--caramel);
  fill: none;
  /* Animação simplificada e robusta */
  animation: draw 1s cubic-bezier(0.65, 0, 0.45, 1) 0.5s forwards;
  filter: drop-shadow(0 4px 12px rgba(212, 130, 26, 0.3));
}

@keyframes draw {
  to { stroke-dashoffset: 0; }
}

.success-text {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 48px;
  color: var(--brown);
  margin-bottom: 40px;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeInText 1s cubic-bezier(0.34, 1.56, 0.64, 1) 1.2s forwards;
  letter-spacing: -1px;
}

@media (min-width: 860px) {
  .success-text { font-size: 72px; }
}

@keyframes fadeInText {
  to { opacity: 1; transform: translateY(0); }
}

/* ── BUTTON ── */
.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 18px 44px;
  border-radius: 50px;
  font-weight: 800;
  font-size: 18px;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  background: linear-gradient(135deg, var(--caramel), var(--caramel-light));
  color: #fff;
  border: none;
  box-shadow: 0 10px 30px rgba(212, 130, 26, 0.35);
  opacity: 0;
  animation: fadeInBtn 1s ease-out 2s forwards;
}

.btn-back:hover {
  transform: translateY(-6px) scale(1.05);
  box-shadow: 0 15px 40px rgba(212, 130, 26, 0.45);
}

@keyframes fadeInBtn {
  to { opacity: 1; }
}

/* ── CONFETTI ── */
.confetti {
  position: absolute;
  width: 12px;
  height: 12px;
  top: -20px;
  z-index: 5;
  border-radius: 3px;
  animation: confettiFall var(--d) linear infinite;
}

@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

</style>
</head>
<body>

<div class="auth-container">
  <div class="svg-wrapper">
    <svg class="checkmark-svg" viewBox="0 0 52 52">
      <path class="checkmark-path" d="M14 27l7 7 17-17"/>
    </svg>
  </div>
  <h1 class="success-text">Sucesso!</h1>
  <a href="https://natan95840.github.io/Pudixel" class="btn-back">
    <i class="fa-solid fa-rocket"></i> Voltar para o site
  </a>
</div>

<script>
function createConfetti() {
  const colors = ['#D4821A', '#E8A03A', '#F5C3A0', '#FDE9B0', '#B8E6C4', '#B0D4F5', '#FFFFFF'];
  const confettiCount = 100;
  
  for (let i = 0; i < confettiCount; i++) {
    const confetti = document.createElement('div');
    confetti.className = 'confetti';
    
    const color = colors[Math.floor(Math.random() * colors.length)];
    const left = Math.random() * 100 + 'vw';
    const duration = (Math.random() * 4 + 4) + 's'; 
    const delay = Math.random() * 8 + 's';
    const isDesktop = window.innerWidth > 860;
    const sizeBase = isDesktop ? 16 : 8;
    const sizeVar = isDesktop ? 12 : 6;
    const size = (Math.random() * sizeVar + sizeBase) + 'px';
    
    confetti.style.backgroundColor = color;
    confetti.style.left = left;
    confetti.style.width = size;
    confetti.style.height = size;
    confetti.style.setProperty('--d', duration);
    confetti.style.animationDelay = delay;
    
    document.body.appendChild(confetti);
  }
}

setTimeout(createConfetti, 1000);
</script>

</body>
</html>
